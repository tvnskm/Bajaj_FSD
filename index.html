<!DOCTYPE html>
<html>
<head>
    <title>BFHL API Tester</title>
</head>
<body>

    <h3>BFHL API Tester</h3>

    <p>Enter data (one per line):</p>

    <textarea id="input" rows="10" cols="40">
A->B
A->C
B->D
    </textarea>

    <br><br>

    <button onclick="sendData()">Submit</button>

    <h4>Response:</h4>
    <pre id="output"></pre>

    <script>
        async function sendData() {
            const raw = document.getElementById("input").value;

            const data = raw
                .split("\n")
                .map(x => x.trim())
                .filter(x => x !== "");

            try {
                const res = await fetch("https://bajaj-fsd-w53x.onrender.com/bfhl", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ data: data })
                });

                const json = await res.json();
                document.getElementById("output").textContent =
                    JSON.stringify(json, null, 2);

            } catch (err) {
                document.getElementById("output").textContent =
                    "Error: " + err.message;
            }
        }
    </script>

</body>
</html>
